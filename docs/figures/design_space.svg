<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 470" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <rect x="0" y="0" width="820" height="470" rx="12" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="819" height="469" rx="12" fill="none" stroke="#e5e7eb"/>

  <!-- Titles -->
  <text x="40" y="38" font-size="20" font-weight="700" fill="#111827">FFT design space — two implemented operating points</text>
  <text x="40" y="58" font-size="13" fill="#6b7280">1024-pt Radix-2, 16-bit Q1.15 · Xilinx Artix-7 xc7a200tfbg676-2 @ 100 MHz · bubble area ∝ energy per FFT</text>

  <!-- Plot frame -->
  <rect x="90" y="70" width="690" height="320" fill="#fafafa" stroke="#e5e7eb"/>

  <!-- Gridlines + Y ticks (throughput, log) -->
  <g stroke="#eceff3">
    <line x1="90" y1="390" x2="780" y2="390"/>
    <line x1="90" y1="230" x2="780" y2="230"/>
    <line x1="90" y1="70"  x2="780" y2="70"/>
  </g>
  <g font-size="12" fill="#6b7280" text-anchor="end">
    <text x="82" y="394">10</text>
    <text x="82" y="234">100</text>
    <text x="82" y="74">1000</text>
  </g>

  <!-- X ticks (area, log) -->
  <g stroke="#eceff3">
    <line x1="160" y1="70" x2="160" y2="390"/>
    <line x1="434" y1="70" x2="434" y2="390"/>
    <line x1="642" y1="70" x2="642" y2="390"/>
  </g>
  <g font-size="12" fill="#6b7280" text-anchor="middle">
    <text x="160" y="408">2k</text>
    <text x="434" y="408">5k</text>
    <text x="642" y="408">10k</text>
  </g>

  <!-- Axis labels -->
  <text x="435" y="438" font-size="13" fill="#374151" text-anchor="middle">Area — slice LUTs (log scale)</text>
  <text x="26" y="230" font-size="13" fill="#374151" text-anchor="middle" transform="rotate(-90 26 230)">Throughput — MS/s (log scale)</text>

  <!-- Trade-off arrow -->
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <line x1="245" y1="330" x2="612" y2="150" stroke="#9ca3af" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ah)"/>
  <text x="405" y="232" font-size="12.5" fill="#6b7280" text-anchor="middle">4.3× LUTs · 40× DSP</text>
  <text x="405" y="249" font-size="12.5" fill="#6b7280" text-anchor="middle">→ 20× throughput</text>

  <!-- Serial point -->
  <circle cx="210" cy="343" r="34" fill="#2563eb" fill-opacity="0.16" stroke="#2563eb" stroke-width="1.5"/>
  <circle cx="210" cy="343" r="4" fill="#2563eb"/>
  <text x="210" y="298" font-size="13" font-weight="700" fill="#1e40af" text-anchor="middle">Serial</text>
  <text x="210" y="393" font-size="11.5" fill="#374151" text-anchor="middle">2,372 LUT · 19.6 MS/s</text>
  <text x="210" y="408" font-size="11.5" fill="#6b7280" text-anchor="middle">4 DSP · 0.178 W · ~12.9 µJ/FFT</text>

  <!-- Parallel MDF point -->
  <circle cx="645" cy="134" r="14" fill="#ea580c" fill-opacity="0.18" stroke="#ea580c" stroke-width="1.5"/>
  <circle cx="645" cy="134" r="4" fill="#ea580c"/>
  <text x="645" y="104" font-size="13" font-weight="700" fill="#c2410c" text-anchor="middle">Parallel MDF (P=4)</text>
  <text x="645" y="164" font-size="11.5" fill="#374151" text-anchor="middle">10,101 LUT · 400 MS/s</text>
  <text x="645" y="179" font-size="11.5" fill="#6b7280" text-anchor="middle">160 DSP · 0.824 W · ~2.1 µJ/FFT</text>
</svg>
